name: Deploy ElmerML to Azure Function App

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  AZURE_FUNCTIONAPP_NAME: 'PaRanjith'

jobs:
  build:                              # ← CI part (you add this)
    runs-on: windows-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'

    - name: Install Dependencies      # ← CI step
      run: pip install -r requirements.txt

    - name: Verify Pickle File        # ← CI step
      run: Get-ChildItem "Pickle file/"

    - name: Create Deployment ZIP     # ← CI step
      run: |
        Compress-Archive -Force -Path @(
          "function_app.py",
          "requirements.txt",
          "Pickle file"
        ) -DestinationPath "deployment.zip"

    - name: Upload ZIP as Artifact    # ← hands zip from CI to CD
      uses: actions/upload-artifact@v4
      with:
        name: elmerml-package
        path: deployment.zip

  deploy:                             # ← CD part (Azure generated this)
    runs-on: windows-latest
    needs: build                      # ← waits for CI to finish

    steps:
    - name: Download ZIP Artifact     # ← picks up zip from CI
      uses: actions/download-artifact@v4
      with:
        name: elmerml-package

    - name: Deploy to Azure Function App
      uses: Azure/functions-action@v1
      with:
        app-name: ${{ env.AZURE_FUNCTIONAPP_NAME }}
        package: './deployment.zip'
        publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_987CA98F99234A3FB98FCBD0EF19B61B }}
