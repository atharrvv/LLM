name: Build and deploy Python project to Azure Function App - PaRanjith

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  AZURE_FUNCTIONAPP_NAME: 'PaRanjith'
  PYTHON_VERSION: '3.10'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Python version
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}

    - name: Install dependencies
      run: pip install -r requirements.txt

    - name: Verify Pickle File
      run: ls -la "Pickle file/"

    # ZIP only required files
    - name: Create Deployment ZIP
      run: |
        zip -r deployment.zip \
          "function_app.py" \
          "requirements.txt" \
          "host.json" \
          "Pickle file/"

    - name: Verify ZIP Contents
      run: unzip -l deployment.zip

    # Upload only deployment.zip
    - name: Upload artifact for deployment job
      uses: actions/upload-artifact@v4
      with:
        name: python-app
        path: deployment.zip       # ← only zip, nothing else

  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
    - name: Download artifact from build job
      uses: actions/download-artifact@v4
      with:
        name: python-app

    # NO unzip step - deploy zip directly
    - name: Deploy to Azure Functions
      uses: Azure/functions-action@v1
      with:
        app-name: ${{ env.AZURE_FUNCTIONAPP_NAME }}
        slot-name: 'Production'
        package: './deployment.zip'   # ← direct zip, no dot
        publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_36995A9F0F974B0BA9660C213D268E7E }}
        scm-do-build-during-deployment: false
        enable-oryx-build: false
